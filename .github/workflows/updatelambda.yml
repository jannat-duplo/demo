name: Update Lambda

on:
  workflow_dispatch:
    inputs:
      lambda:
        description: Lambda name
        required: true
      uri:
        description: A docker image uri or an s3 uri in the form of s3://bucket/path
        required: false

jobs:
  update-lambda:
    runs-on: ubuntu-latest
    environment: qa-aws
    env:
      DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
      DUPLO_HOST: ${{ vars.DUPLO_HOST }}
      DUPLO_TENANT: ${{ vars.DUPLO_TENANT }}
    steps:
      - name: Duplo Setup AWS
        uses: duplocloud/actions@v0.0.14
        with:
          region: ${{ vars.AWS_REGION }}

      - name: Update Lambda
        uses: duplocloud/actions/update-lambda@v0.0.14
        with:
          lambda: ${{ inputs.lambda }}
          uri: ${{ inputs.uri }}
